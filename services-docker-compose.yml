version: '3.9'

services:

  jenkins:
    image: jenkins/jenkins:jdk21
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-home:/var/jenkins_home
    networks:
      - jenkins-network

volumes:
  jenkins-home:

networks:
  jenkins-network:
    driver: bridge
